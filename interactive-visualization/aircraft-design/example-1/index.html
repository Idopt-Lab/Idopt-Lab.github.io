<!DOCTYPE html>
<html>
<head>
  <meta http-equiv='Content-Type' content='text/html;charset=utf-8'></meta>
  <link rel='stylesheet' type='text/css' href='x3dom.css'></link>
  <script type='text/javascript' src='x3dom.js'></script>
  <title>Flight &amp; Aerodynamic Simulation — Idopt Lab</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #HUDs_Div {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background-color: rgba(15, 15, 15, 0.7);
      color: #f0f0f0;
      padding: 20px 16px 20px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: sans-serif;
      min-width: 290px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
    }

    input[type="radio"] {
      accent-color: #000000;
    }

    #alphaSliderBlock {
      margin-top: 14px;
    }

    #alphaSlider {
      accent-color: #000000;
    }

    /* Chrome / Edge / Safari */
    #alphaSlider::-webkit-slider-thumb {
      width: 10px;
      height: 10px;
    }

    /* Firefox */
    #alphaSlider::-moz-range-thumb {
      width: 10px;
      height: 10px;
    }

    .pressure-btn {
      background-color: #000000;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      font-family: sans-serif;
      font-size: 14px;
      cursor: pointer;
      margin-top: 18px;
      transition: all 0.2s ease;
      display: block;
    }

    .pressure-btn:hover {
      background-color: #000000;
    }

    .pressure-btn:active {
      transform: scale(0.98);
    }

    #output-container {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background-color: rgba(15, 15, 15, 0.7);
      color: white;
      padding: 20px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      width: 80%;
      max-width: 1000px;
      font-family: sans-serif;
      font-size: 1.1em;
      line-height: 1.4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
    }

    #output-text {
      flex: 1;
      text-align: left;
    }

    #output-text h3 {
      margin-top: 0;
    }

    #output-text p {
      margin-bottom: 0;
    }

    #graph-container {
      flex: 0 0 350px;
      display: none;
      text-align: center;
    }

    #graph-container img {
      max-width: 100%;
      height: auto;
      border-radius: 5px;
    }

    #x3dElement {
      display: block;
      height: 100vh !important;
      width: 100vw !important;
    }

    #HUDs_Div, #output-container {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
    }

    #alphaSliderBlock label {
      font-family: 'SF Mono', 'Courier New', monospace;
      letter-spacing: -0.2px;
    }

    #HUDs_Div > p:first-of-type,
    #HUDs_Div > div:first-of-type,
    #HUDs_Div > h3:first-of-type,
    #HUDs_Div > span:first-of-type {
      font-size: 1.15em !important;
      font-weight: 700 !important;
      line-height: 1.3 !important;
      white-space: normal;
      display: block;
      max-width: 320px;
    }

    #HUDs_Div label,
    #HUDs_Div form,
    #HUDs_Div input {
      font-weight: normal !important;
      font-size: 16px !important;
    }

    #back-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 2000;
      background-color: rgba(15, 15, 15, 0.7);
      color: #f0f0f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-size: 14px;
      text-decoration: none;
      backdrop-filter: blur(2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: background-color 0.2s;
    }
    #back-btn:hover {
      background-color: rgba(40, 40, 40, 0.9);
    }
  </style>

  <script>
    // ------------------------------
    // Color-based highlighting system
    // Hover -> cyan ; Click/select -> blue
    // ------------------------------

    const PART_DEFS = [
      'FuselagePart',
      'WingPart',
      'ElectricEnginePart',
      'TailPart',
      'ExteriorEnginePart',
      'InteriorEnginePart',
      'FuselagePart1',
      'WingPart1',
      'TailPart1'
    ];

    const INFO = {
      FuselagePart: {
        title: 'Plane Fuselage',
        text:
          "SUSAN's is designed to accommodate up to 180 passengers (the same capacity as a large single-aisle plane) and boasts a 10 MW class EAP system to electrify this regional-class aircraft. The SUSAN concept was inspired by the idea that it may be possible to create a transport category aircraft with a single fuel burning engine if it is combined in a hybrid configuration with electric engines and an electrical power source.",
      },

      WingPart: {
        title: 'Wings',
        text:
          'The SUSAN aircraft has a wingspan of 116 ft. The wings have been designed for an 8.3% reduction in drag through studies of the laminar flow, or smooth-traveling airflow, over the aircraft wings. Additionally, the wings are designed for an efficient thermal management system with three loops at different temperatures that manage the engines, electrical system, and batteries.',
      },

      ElectricEnginePart: {
        title: 'Wing-Mounted Electric Engines',
        text:
          'The wing-mounted engines provide 65% of the total thrust of the aircraft and are entirely electric. They draw from the power generated by the tail-mounted turbojet engine through the generators and the rechargeable battery, and under nominal conditions the entire system is self-sufficient. The electric engines on either side of the plane are encased in an outer shell to reduce drag from the suction effect of the fanblades. Each wing-mounted electric engine has a system with a main generator converter, a rechargeable battery, a single use battery for emergency purposes, the electric engine motor, and circuitry.',
      },

      TailPart: {
        title: 'T-Tail',
        text:
          'The vertical tail features an innovative design in which the structure is partially embedded in the exterior of the engine and the primary loads are shared between the tail and the engine. This design also minimizes engine flow blockage, and was tested to optimize airflow along the body of the plane.',
      },

      ExteriorEnginePart: {
        title: 'Tail-Mounted Turbo Jet-Engine - Exterior',
        text:
          'The tail-mounted engine combines a traditional gas turbine with a mechanism called boundary layer ingesting (BLI) concept, that uses the flow along the body of the plane to produce the required thrust. It uses hydrocarbon fuel to provide 35% of the total thrust for the aircraft and generates the power required for the wing-mounted electric propulsors. The power is extracted and managed via generators and a rechargeable battery connected at the front of the engine to the wing-mounted propulsors. In case of turbo fan failure a single use battery is employed.',
      },

      InteriorEnginePart: {
        title: 'Tail-Mounted Turbo Jet-Engine - Interior',
        text:
          'The tail-mounted engine combines a traditional gas turbine with a mechanism called boundary layer ingesting (BLI) concept, that uses the flow along the body of the plane to produce the required thrust. It uses hydrocarbon fuel to provide 35% of the total thrust for the aircraft and generates the power required for the wing-mounted electric propulsors. The power is extracted and managed via generators and a rechargeable battery connected at the front of the engine to the wing-mounted propulsors. In case of turbo fan failure a single use battery is employed.',
      },

      FuselagePart1: {
        title: 'Fuselage',
        text: "This is the fuselage of the pod plane. It is the main body of the aircraft and acts as the central structural backbone. VSPAERO simulations of this model showed that the fuselage's surface area and shape are the primary drivers of parasite drag. The Total Drag Coefficient (C<sub>D</sub>) vs. α plot to the right demonstrates this relationship, showing how the drag increases as the angle of attack (α) moves from 4° to 10°. This data shows exactly how the aerodynamic load on the fuselage grows as the air hits it at a steeper angle."
      },

      WingPart1: {
        title: 'Wings',
        text: "These are the wings of the pod plane. The wings are the primary lift-generating surfaces of the pod plane, utilizing a specific airfoil shape to create the pressure differences necessary for flight. The performance of these surfaces is mapped in the Lift Coefficient (C<sub>L</sub>) vs. α plot to the right. As the angle of attack (α) moves from 4° to 10°, the VSPAERO simulation demonstrates a linear increase in lift, showing how the wing's orientation directly impacts the aircraft's ability to stay airborne."
      },

      TailPart1: {
        title: 'Tail',
        text: "This is the tail of the pod plane. The tail assembly, featuring vertical and horizontal stabilizers, is responsible for maintaining the aircraft's longitudinal and directional stability. The relationship between the lift required to stay airborne and the drag that must be overcome is visualized in the Drag Polar (C<sub>L</sub> vs. C<sub>D</sub>) curve to the right. The tail's design is critical for counteracting the pitching moments created at higher lift values, ensuring the plane remains stable as the VSPAERO data moves through the 4°, 7°, and 10° angles of attack."
      }
    };

    const initialText =
      "This is a flight visualization that includes both interactive (clickable) models and a static aerodynamic pressure view. The interactive version allows users to explore different aircraft components and view corresponding graphs of lift, drag, and angle of attack for the pod plane. It also includes features to hide selected components to reveal internal structures of the pod plane, as well as animations and clickable elements for the NASA SUSAN aircraft model. There is also a slider bar that enables exploration of the pod plane's pressure distribution at different angles of attack. The static version displays the pressure coefficient distribution exported directly from VSPAERO simulations, showing how airflow varies across the aircraft during flight conditions.";

    const Colors = { hover: '0 1 1', select: '0 0 0.5' };

    let currentSelection = null;

    let pressureModeActive = false;
    let interiorVisible = false;

    const baselineByPart = new Map();

    function getMaterials(part) {
      const phys = Array.from(part.getElementsByTagName('PhysicalMaterial'));
      const classic = Array.from(part.getElementsByTagName('Material'));
      return { phys, classic };
    }

    function captureBaseline(part) {
      const mats = getMaterials(part);
      const existing = baselineByPart.get(part) || [];
      const seen = new Set(existing.map(r => r.element));
      for (const el of mats.phys) {
        if (seen.has(el)) continue;
        existing.push({
          element: el,
          attr: 'diffuseFactor',
          value: el.getAttribute('diffuseFactor'),
          hadAttr: el.hasAttribute('diffuseFactor')
        });
        seen.add(el);
      }
      for (const el of mats.classic) {
        if (seen.has(el)) continue;
        existing.push({
          element: el,
          attr: 'diffuseColor',
          value: el.getAttribute('diffuseColor'),
          hadAttr: el.hasAttribute('diffuseColor')
        });
        seen.add(el);
      }
      baselineByPart.set(part, existing);
    }

    function setPartColor(part, color) {
      captureBaseline(part);
      const mats = getMaterials(part);
      for (const el of mats.phys) {
        try { el.setAttribute('diffuseFactor', color); } catch (e) {}
      }
      for (const el of mats.classic) {
        try { el.setAttribute('diffuseColor', color); } catch (e) {}
      }
    }

    function restorePartFromBaseline(part) {
      const records = baselineByPart.get(part) || [];
      for (const r of records) {
        if (r.hadAttr) {
          if (r.value === null || r.value === undefined) {
            r.element.setAttribute(r.attr, '');
          }
          else {
            r.element.setAttribute(r.attr, r.value);
          }
        }
        else {
          r.element.removeAttribute(r.attr);
        }
      }
    }

    function selectPartByDEF(partDEF) {
      if (!PART_DEFS.includes(partDEF)) return;

      if (currentSelection && currentSelection !== null) {
        try { restorePartFromBaseline(currentSelection); } catch (e) {}
        currentSelection = null;
      }

      const part = document.querySelector("Transform[DEF='" + partDEF + "']");
      if (!part) {
        console.warn("Part with DEF='" + partDEF + "' not found.");
        return;
      }

      restorePartFromBaseline(part);
      setPartColor(part, Colors.select);
      currentSelection = part;
    }

    function attachHoverHandlers(part) {
      part.addEventListener('mouseover', function () {
        if (currentSelection === part) return;
        setPartColor(part, Colors.hover);
      });
      part.addEventListener('mouseout', function () {
        if (currentSelection === part) return;
        restorePartFromBaseline(part);
      });
    }

    x3dom.runtime.ready = function () {
      var x3dElement = document.getElementById('x3dElement');
      if (x3dElement && x3dElement.runtime && x3dElement.runtime.resetView) {
        try { x3dElement.runtime.resetView(); } catch (e) {}
      }

      for (let i = 0; i < PART_DEFS.length; i++) {
        const def = PART_DEFS[i];
        const part = document.querySelector("Transform[DEF='" + def + "']");
        if (!part) continue;
        try { captureBaseline(part); } catch (e) {}
        attachHoverHandlers(part);
      }
    };

    function showDetail(partName) {
      if (pressureModeActive && partName.endsWith('1')) {
        return;
      }

      console.log("Clicked on:", partName);

      let infoTitle = "";
      let infoDescription = "";
      let graphImageFile = "";

      const graphContainer = document.getElementById('graph-container');
      if (graphContainer) graphContainer.style.display = 'none';

      if (PART_DEFS.includes(partName)) {
        const info = INFO[partName];
        infoTitle = info.title;
        infoDescription = info.text;

        if (partName === 'WingPart1') graphImageFile = 'Cl_vs_a.png';
        if (partName === 'FuselagePart1') graphImageFile = 'Cd_vs_a.png';
        if (partName === 'TailPart1') graphImageFile = 'Cl_vs_Cd.png';

        selectPartByDEF(partName);
      }
      else {
        infoTitle = "Interactive Visualization of Flight and Aerodynamic Simulation Data";
        infoDescription = initialText;

        if (currentSelection) {
          try { restorePartFromBaseline(currentSelection); } catch (e) {}
          currentSelection = null;
        }
      }

      const titleEl = document.getElementById('info-title');
      const descEl = document.getElementById('info-description');
      if (titleEl) titleEl.innerText = infoTitle;
      if (descEl) descEl.innerHTML = infoDescription;

      if (graphImageFile) {
        const img = document.getElementById('graph-image');
        if (img) img.src = graphImageFile;
        if (graphContainer) graphContainer.style.display = 'block';
      }
    }

    function bindButtonName(viewpointID) {
      console.log(viewpointID);
      document.getElementById(viewpointID).bind = true;
    }

    document.addEventListener("DOMContentLoaded", function() {
      showDetail('initial');
    });

    function toggleInteriorView() {
      const fuselage = document.getElementById('FuselagePart1');
      const wing = document.getElementById('WingPart1');
      const tail = document.getElementById('TailPart1');
      const interiorView = document.getElementById('InteriorView');
      const pressurePlane = document.getElementById('Pressure_Overlay');
      const standaloneLegend = document.getElementById('standalone-legend');
      const titleEl = document.getElementById('info-title');
      const descEl = document.getElementById('info-description');
      const graphContainer = document.getElementById('graph-container');

      interiorVisible = !interiorVisible;

      if (interiorVisible) {
        pressureModeActive = false;
        pressurePlane.setAttribute('render', 'false');
        standaloneLegend.style.display = 'none';

        fuselage.setAttribute('render', 'false');
        wing.setAttribute('render', 'false');
        tail.setAttribute('render', 'false');
        interiorView.setAttribute('render', 'true');

        document.getElementById('alphaSlider').disabled = true;
        titleEl.innerText = "Pod Plane Interior Inspection";
        descEl.innerHTML =
          "This interior inspection view reveals the internal seating layout and cabin structure of the pod plane configuration. The transparent fuselage shell allows the internal arrangement of passenger seating and cabin spacing to be examined while still preserving the external aerodynamic shape of the aircraft.";

        if (graphContainer) {
          graphContainer.style.display = 'none';
        }

        if (currentSelection) {
          try {
            restorePartFromBaseline(currentSelection);
          } catch (e) {}
          currentSelection = null;
        }
      }
      else {
        fuselage.setAttribute('render', 'true');
        wing.setAttribute('render', 'true');
        tail.setAttribute('render', 'true');
        interiorView.setAttribute('render', 'false');

        document.getElementById('alphaSlider').disabled = true;
        document.getElementById('pressureBtn').disabled = false;

        showDetail('initial');
      }
    }

    function togglePressureDistribution() {
      const pressurePlane = document.getElementById('Pressure_Overlay');
      const fuselage = document.getElementById('FuselagePart1');
      const wing = document.getElementById('WingPart1');
      const tail = document.getElementById('TailPart1');
      const interiorView = document.getElementById('InteriorView');
      const standaloneLegend = document.getElementById('standalone-legend');
      const titleEl = document.getElementById('info-title');
      const descEl = document.getElementById('info-description');
      const graphContainer = document.getElementById('graph-container');

      pressureModeActive = !pressureModeActive;

      if (pressureModeActive) {
        interiorView.setAttribute('render', 'false');
        interiorVisible = false;
        pressurePlane.setAttribute('render', 'true');

        document.getElementById('alphaSlider').disabled = false;

        fuselage.setAttribute('render', 'false');
        wing.setAttribute('render', 'false');
        tail.setAttribute('render', 'false');

        standaloneLegend.style.display = 'block';
        titleEl.innerText = "Pod Plane Pressure Distribution";
        descEl.innerHTML =
          "This visualization represents the pressure coefficient (C<sub>p</sub>) distribution generated from a VSPAERO aerodynamic analysis of the pod plane configuration. The simulation was performed to examine how airflow interacts with the aircraft surfaces and how pressure changes across the fuselage, wings, and tail assembly during flight conditions. The colormap displays the variation in surface pressure over the aircraft geometry, where warmer colors represent regions of higher pressure and cooler colors indicate regions of lower pressure associated with accelerated airflow and lift generation. Areas of high pressure are concentrated near the leading surfaces directly interacting with incoming airflow, while lower-pressure regions are along the upper aerodynamic surfaces as the flow accelerates around the aircraft.";

        if (graphContainer) {
          graphContainer.style.display = 'none';
        }

        if (currentSelection) {
          try {
            restorePartFromBaseline(currentSelection);
          } catch (e) {}
          currentSelection = null;
        }
      }
      else {
        pressurePlane.setAttribute('render', 'false');
        interiorView.setAttribute('render', 'false');
        interiorVisible = false;

        document.getElementById('alphaSlider').disabled = true;

        fuselage.setAttribute('render', 'true');
        wing.setAttribute('render', 'true');
        tail.setAttribute('render', 'true');

        standaloneLegend.style.display = 'none';
        showDetail('initial');
      }
    }

    function resetToInitial() {
      if (currentSelection) {
        try {
          restorePartFromBaseline(currentSelection);
        } catch (e) {}
        currentSelection = null;
      }
      showDetail('initial');
    }

    function updateAlpha(val) {
      document.getElementById("alphaLabel").innerText = val;

      if (!pressureModeActive) return;

      const overlay = document.getElementById("Pressure_Overlay");
      overlay.children[0].setAttribute("url", "./case_" + val + ".glb");
    }
  </script>
</head>

<body>
  <a id="back-btn" href="../">← Aircraft Design</a>

  <div id='HUDs_Div'>
    <div id='X3DOM_AOPT_Links' class='group'>
      Web-Based Interactive Visualization of Flight and Aerodynamic Simulation Data
      <hr>
      <form>
        <label><input type="radio" name="buttons" value="Viewpoint1" checked onclick="bindButtonName('Viewpoint1')"> Viewpoint 1</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint2" onclick="bindButtonName('Viewpoint2')"> Viewpoint 2</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint3" onclick="bindButtonName('Viewpoint3')"> Viewpoint 3</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint4" onclick="bindButtonName('Viewpoint4')"> Viewpoint 4</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint5" onclick="bindButtonName('Viewpoint5')"> Viewpoint 5</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint6" onclick="bindButtonName('Viewpoint6')"> Viewpoint 6</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint7" onclick="bindButtonName('Viewpoint7')"> Viewpoint 7</label><br>

        <input type="button"
               id="interiorBtn"
               class="pressure-btn"
               value="Interior Inspection"
               onclick="toggleInteriorView()">

        <input type="button"
               id="pressureBtn"
               class="pressure-btn"
               value="Pod Plane Pressure Distribution"
               onclick="togglePressureDistribution()">

        <div id="alphaSliderBlock">
          <label>Alpha: <span id="alphaLabel">-3</span>°</label><br>
          <input type="range" id="alphaSlider"
                 min="-3" max="6" step="1"
                 value="-3"
                 disabled
                 oninput="updateAlpha(this.value)">
        </div>
      </form>
    </div>
  </div>

                <Inline DEF="FuselageInline" url="./fuselage.glb" mapDEFToID="true" nameSpaceName="Fuselage" ></Inline>
              </Transform>
              <Transform DEF="WingPart" id="WingPart" rotation="0 0 0 0" bboxDisplay="false" bboxColor="1 1 1" bboxMargin="0" onclick="showDetail('WingPart')">
                <Inline DEF="WingInline" url="./wing.glb" mapDEFToID="true" nameSpaceName="WingP"></Inline>
              </Transform>
              <Transform DEF="ElectricEnginePart" id="ElectricEnginePart" rotation="0 0 0 0" scale="0.309 0.309 0.309" bboxDisplay="false" bboxColor="1 1 1" bboxMargin="0" onclick="showDetail('ElectricEnginePart')">
                <Inline DEF="ElectricEngineInline" url="./electric_engines_animated.glb" mapDEFToID="true" nameSpaceName="Engine"></Inline>
              </Transform>
              <Transform DEF="TailPart" id="TailPart" rotation="0 0 0 0" bboxDisplay="false" bboxColor="1 1 1" bboxMargin="0" onclick="showDetail('TailPart')">
                <Inline DEF="TailInline" url="./tail.glb" mapDEFToID="true" nameSpaceName="Tail"></Inline>
              </Transform>
              <Transform DEF="ExteriorEnginePart" id="ExteriorEnginePart" rotation="0 0 0 0" bboxDisplay="false" bboxColor="1 1 1" bboxMargin="0" onclick="showDetail('ExteriorEnginePart')">
                <Inline DEF="ExteriorEngineInline" url="./exterior_engine.glb" mapDEFToID="true" nameSpaceName="EngineExt"></Inline>
              </Transform>
              <Transform DEF="InteriorEnginePart" id="InteriorEnginePart" rotation="0 0 0 0" scale="0.309 0.309 0.309" bboxDisplay="false" bboxColor="1 1 1" bboxMargin="0" onclick="showDetail('InteriorEnginePart')">
                <Inline DEF="InteriorEngineInline" url="./interior_engine_animated.glb" mapDEFToID="true" nameSpaceName="EngineInt"></Inline>
              </Transform>
            </Transform>

            <Transform DEF="PlanePitch" translation="0 0 0" rotation="1 0 0 0" scale='1 1 1'>
              <Transform DEF="Boeing737Part" id="Boeing737Part" translation="38 -10 -50" rotation="0 1 0 3.14" scale="1 1 1" bboxDisplay="false" bboxColor="1 1 1" bboxMargin="0" onclick="resetToInitial()">
                <Inline DEF="Boeing737Inline" url="./boeing737.glb" mapDEFToID="true" nameSpaceName="Boeing737"></Inline>
              </Transform>
            </Transform>

            <Transform DEF="Cessna172Part" id="Cessna172Part" translation="20 7 -20" rotation="0 1 0 -1.5708" scale="1 1 1" bboxDisplay="false" bboxColor="1 1 1" bboxMargin="0" onclick="resetToInitial()">
              <Inline DEF="Cessna172Inline" url="./cessna172.glb" mapDEFToID="true" nameSpaceName="Cessna172"></Inline>
            </Transform>

            <Transform DEF="X57Part" id="X57Part" translation="20 5 -5" rotation="0 1 0" scale="1 1 1" bboxDisplay="false" bboxColor="1 1 1" bboxMargin="0" onclick="resetToInitial()">
              <Inline DEF="X57Inline" url="./x57.glb" mapDEFToID="true" nameSpaceName="X57"></Inline>
            </Transform>

            <Transform DEF="PlaneGroup" translation="0 7 -12" rotation="0 1 0" scale='2 2 2'>
              <Transform DEF="FuselagePart1" id="FuselagePart1" onclick="showDetail('FuselagePart1')" translation="0 0 0" rotation="0 1 0" scale="1 1 1" bboxDisplay="false">
                <Inline url="./fuselage1.glb" mapDEFToID="true" nameSpaceName="PodFuselage"></Inline>
              </Transform>

              <Transform DEF="WingPart1" id="WingPart1" onclick="showDetail('WingPart1')" translation="0 0 0" rotation="0 1 0" scale="1 1 1" bboxDisplay="false">
                <Inline url="./wing1.glb" mapDEFToID="true" nameSpaceName="PodWing"></Inline>
              </Transform>

              <Transform DEF="TailPart1" id="TailPart1" onclick="showDetail('TailPart1')" translation="0 0 0" rotation="0 1 0" scale="1 1 1" bboxDisplay="false">
                <Inline url="./tail1.glb" mapDEFToID="true" nameSpaceName="PodTail"></Inline>
              </Transform>

              <Transform DEF="Pressure_Overlay" id="Pressure_Overlay" render="false" translation="0 0 0" rotation="0 1 0 0" scale="1 1 1">
                <Inline url="./pressure_pod_plane.glb" mapDEFToID="true" nameSpaceName="PodPressure"></Inline>
              </Transform>

              <Transform DEF="Pressure_Background" id="Pressure_Background" render="false" translation="0 0 0" rotation="0 1 0 0" scale="1 1 1" bboxDisplay="false">
                <Inline url="./pressure_pod_plane.glb" mapDEFToID="true" nameSpaceName="PodPressurePlane"></Inline>
              </Transform>

              <Transform DEF="InteriorView" id="InteriorView" render="false" translation="0 0 0" rotation="0 1 0 0" scale="1 1 1">
                <Inline url="./interior_view.glb" mapDEFToID="true" nameSpaceName="InteriorPod"></Inline>
              </Transform>
            </Transform>
          </Transform>
        </Transform>
      </Transform>
    </Scene>
  </x3d>

  <div id="standalone-legend" style="display: none; position: absolute; bottom: 10px; left: 100px; z-index: 2000;">
    <img src="pressure_legend.png"

    <div id="graph-container">

    </div>
  </div>
</body>
