<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
  <link rel="stylesheet" type="text/css" href="./x3dom.css" />

  <title>NACA 2410 and NASA X-57 — Aircraft Design — Idopt Lab</title>

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    #HUDs_Div {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 1000;
      background-color: rgba(15, 15, 15, 0.7);
      color: #f0f0f0;
      padding: 20px 16px 20px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      min-width: 200px;

      backdrop-filter: blur(2px);
    }

    #HUDs_Div > div:first-of-type {
      font-size: 1.05em;
      font-weight: 700;

    }

    #HUDs_Div label,

      font-size: 14px;
      color: #f0f0f0;
    }

    #HUDs_Div hr {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      margin: 8px 0;
    }

    input[type="radio"] {
      accent-color: #2563eb;
    }

    #HUDs_Div button {
      width: 160px;
      margin-bottom: 6px;
      padding: 8px 10px;
      border: none;
      border-radius: 6px;
      background-color: rgba(37, 99, 235, 0.75);
      color: white;
      cursor: pointer;
      font-size: 12.5px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      transition: background-color 0.2s;
    }

    #HUDs_Div button:hover {
      background-color: rgba(37, 99, 235, 0.95);
    }

    #HUDs_Div button:active {
      transform: scale(0.98);
    }

    #alphaBlock {
      margin-top: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #f0f0f0;
    }

    #alphaSlider {
      accent-color: #2563eb;
      width: 100%;
    }

    #output-container {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background-color: rgba(15, 15, 15, 0.7);
      color: white;
      padding: 20px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(2px);
      width: 80%;
      max-width: 1000px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-size: 1.1em;
      line-height: 1.4;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 20px;
    }

    #output-text {
      flex: 1;
      text-align: left;
    }

    #output-text h3 {
      margin-top: 0;
    }

    #output-text p {
      margin-bottom: 0;
    }

    #graph-container {
      flex: 0 0 420px;
      display: none;
      text-align: center;
    }

    #graph-container img {
      max-width: 100%;
      max-height: 260px;
      height: auto;
      border-radius: 5px;
      background-color: white;
    }

    #back-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      z-index: 2000;
      background-color: rgba(15, 15, 15, 0.7);
      color: #f0f0f0;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      padding: 8px 14px;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
      font-size: 14px;
      text-decoration: none;
      backdrop-filter: blur(2px);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      transition: background-color 0.2s;
    }
    #back-btn:hover {
      background-color: rgba(40, 40, 40, 0.9);
    }
  </style>

  <script>
    const PART_DEFS = [
      'FuselagePart',
      'WingPart',
      'ControlSurfacesPart'
    ];

    let pressureVisible = false;
    let interiorVisible = false;
    let currentAlpha = 0;

    const PRESSURE_ANGLES = [-3, -2, -1, 0, 1, 2, 3, 4, 5, 6];

    const INFO = {
      FuselagePart: {
        title: 'Plane Fuselage',
        text: 'The fuselage represents the main body of the 2410 aircraft model. It provides the central structure that connects the wing, tail, and control surfaces while supporting the overall aerodynamic shape of the aircraft.'
      },

      WingPart: {
        title: 'Wings',
        text: 'The aircraft uses a NACA 2410 airfoil designed for stable lift generation at low to moderate angles of attack. The airfoil has 2% camber located at 40% chord and a maximum thickness of 10% chord. This geometry supports efficient lift production while maintaining smooth airflow over the wing surface.'
      },

      ControlSurfacesPart: {
        title: 'Control Surfaces',
        text: 'Control surfaces are movable aerodynamic devices attached to the wings and tail that allow the aircraft to maneuver. Ailerons control roll, elevators control pitch, and the rudder controls yaw. These surfaces deflect airflow to change the aircraft orientation and maintain stability during flight.'
      },

      PressureDistribution: {
        title: 'CFD Pressure Distribution Visualization',
        text: 'This visualization presents the pressure coefficient (Cₚ) distribution generated from a VSPAero computational fluid dynamics analysis. The simulation was performed at an angle of attack of 4°, a Mach number of 0.75, and a Reynolds number of 1 × 10⁷. The colormap illustrates pressure variation across the aircraft surface, where warmer colors represent regions of higher pressure and cooler colors indicate lower pressure zones associated with lift generation.',
        image: 'pressurescale.png'
      }
    };

    const GRAPH_INFO = {
      clalpha: {
        title: 'CL vs Alpha',
        image: 'clalpha.png',
        text: 'This graph illustrates the relationship between lift coefficient (Cₗ) and angle of attack. As the angle of attack increases, the aircraft produces more lift across the tested range. This trend helps evaluate how effectively the NACA 2410 wing generates lift under changing flight conditions.'
      },

      cmalpha: {
        title: 'CM vs Alpha',
        image: 'cmalpha.png',
        text: 'This graph shows the pitching moment coefficient (Cₘ) as a function of angle of attack. The pitching moment trend provides insight into the aircraft longitudinal stability and helps determine how the aircraft responds as the nose pitches up or down.'
      },

      cdalpha: {
        title: 'CD vs Alpha',
        image: 'cdalpha.png',
        text: 'This graph displays the drag coefficient (Cᴅ) at different angles of attack. Drag generally increases as angle of attack rises because the aircraft experiences greater aerodynamic resistance. This is important for understanding performance losses and efficiency limits.'
      },

      ldalpha: {
        title: 'L/D vs Alpha',
        image: 'ldalpha.png',
        text: 'This graph shows aerodynamic efficiency by comparing lift-to-drag ratio (L/D) across different angles of attack. The maximum L/D value represents the most efficient flight condition, where the aircraft produces the greatest lift relative to drag.'
      },

      dragpolar: {
        title: 'Drag Polar',
        image: 'dragpolar.png',
        text: 'The drag polar shows the relationship between lift coefficient (Cₗ) and drag coefficient (Cᴅ). This curve is used to evaluate how drag changes as lift increases and is a key tool for analyzing aerodynamic performance and aircraft efficiency.'
      }
    };

    const initialText =
      'The aircraft wing uses a NACA 2410 airfoil. The airfoil has 2% camber located at 40% of the chord and a thickness of 10% of the chord. This cambered design helps generate lift efficiently at low and moderate angles of attack.';

    const Colors = { hover: '0 1 1', select: '1 1 1' };

    let currentSelection = null;
    const baselineByPart = new Map();

    function setWhiteAircraftRender(value) {
      const whiteParts = [
        document.querySelector("Transform[DEF='FuselagePart']"),
        document.querySelector("Transform[DEF='WingPart']"),
        document.querySelector("Transform[DEF='ControlSurfacesPart']")
      ];
      whiteParts.forEach(function(part) {
        if (part) part.setAttribute('render', value);
      });
    }

    function force2410WhiteDeep() {
      const ids = ['FuselagePart', 'WingPart', 'ControlSurfacesPart'];
      ids.forEach(function(id) {
        const part = document.querySelector("[DEF='" + id + "']");
        if (!part) return;
        const materials = part.querySelectorAll(
          'Material, PhysicalMaterial, UnlitMaterial, TwoSidedMaterial'
        );
        materials.forEach(function(m) {
          m.setAttribute('diffuseColor', '1 1 1');
          m.setAttribute('diffuseFactor', '1 1 1');
          m.setAttribute('baseColorFactor', '1 1 1 1');
          m.setAttribute('emissiveColor', '0.35 0.35 0.35');
          m.setAttribute('metallicFactor', '0');
          m.setAttribute('roughnessFactor', '0.45');
          m.setAttribute('transparency', '0');
        });
      });
    }

    function toggleInteriorView() {
      const exteriorParts = [
        document.querySelector("Transform[DEF='FuselagePart']"),
        document.querySelector("Transform[DEF='WingPart']"),
        document.querySelector("Transform[DEF='ControlSurfacesPart']")
      ];
      const interiorView = document.getElementById('InteriorView');
      const pressurePlane = document.getElementById('PressureDistribution');

      interiorVisible = !interiorVisible;

      if (interiorVisible) {
        pressureVisible = false;
        if (pressurePlane) pressurePlane.setAttribute('render', 'false');
        hideAllPressureAngles();

        exteriorParts.forEach(function(part) {
          if (part) part.setAttribute('render', 'false');
        });
        if (interiorView) interiorView.setAttribute('render', 'true');

        const titleEl = document.getElementById('info-title');
        const descEl = document.getElementById('info-description');
        const graphContainer = document.getElementById('graph-container');
        if (titleEl) titleEl.innerHTML = 'Interior Aircraft View';
        if (descEl) descEl.innerHTML =
          'This view uses a transparent fuselage shell to reveal the internal seating layout of the aircraft. It allows the interior arrangement to be inspected while still preserving the outer fuselage shape.';
        if (graphContainer) graphContainer.style.display = 'none';

      } else {
        exteriorParts.forEach(function(part) {
          if (part) part.setAttribute('render', 'true');
        });
        if (interiorView) interiorView.setAttribute('render', 'false');
        showDetail('initial');
      }
    }

    function togglePressureView() {
      const pressurePlane = document.getElementById('PressureDistribution');
      pressureVisible = !pressureVisible;

      if (pressureVisible) {
        interiorVisible = false;
        const interiorView = document.getElementById('InteriorView');
        if (interiorView) interiorView.setAttribute('render', 'false');
        setWhiteAircraftRender('false');
        if (pressurePlane) pressurePlane.setAttribute('render', 'true');

        const slider = document.getElementById('alphaSlider');
        if (slider) slider.value = 0;
        updatePressureAngle(0);
        showDetail('PressureDistribution');

      } else {
        setWhiteAircraftRender('true');
        if (pressurePlane) pressurePlane.setAttribute('render', 'false');
        hideAllPressureAngles();
        showDetail('initial');
      }
    }

    function hideAllPressureAngles() {
      for (var i = 0; i < PRESSURE_ANGLES.length; i++) {
        var node = document.getElementById('Pressure_' + PRESSURE_ANGLES[i]);
        if (node) node.setAttribute('render', 'false');
      }
    }

    function updatePressureAngle(alphaValue) {
      currentAlpha = parseInt(alphaValue);
      var alphaText = document.getElementById('alphaValueText');
      if (alphaText) alphaText.innerHTML = currentAlpha + '°';

      if (!pressureVisible) {
        pressureVisible = true;
        setWhiteAircraftRender('false');
        var pressurePlane = document.getElementById('PressureDistribution');
        if (pressurePlane) pressurePlane.setAttribute('render', 'true');
      }

      hideAllPressureAngles();
      var selectedNode = document.getElementById('Pressure_' + currentAlpha);
      if (selectedNode) selectedNode.setAttribute('render', 'true');

      var titleEl = document.getElementById('info-title');
      var descEl = document.getElementById('info-description');
      if (titleEl) titleEl.innerHTML = 'Pressure Distribution at ' + currentAlpha + '° Angle of Attack';
      if (descEl) descEl.innerHTML =
        'This visualization shows the pressure coefficient (Cₚ) distribution for the aircraft at an angle of attack of ' +
        currentAlpha +
        '°. Use the slider to switch between ParaView pressure distribution exports from -3° to 6°.';

      var graphContainer = document.getElementById('graph-container');
      if (graphContainer) graphContainer.style.display = 'none';
    }

    function getMaterials(part) {
      return {
        phys: Array.from(part.getElementsByTagName('PhysicalMaterial')),
        classic: Array.from(part.getElementsByTagName('Material'))
      };
    }

    function captureBaseline(part) {
      var mats = getMaterials(part);
      var existing = baselineByPart.get(part) || [];
      var seen = new Set(existing.map(function(r) { return r.element; }));
      for (var el of mats.phys) {
        if (seen.has(el)) continue;
        existing.push({ element: el, attr: 'diffuseFactor', value: el.getAttribute('diffuseFactor'), hadAttr: el.hasAttribute('diffuseFactor') });
        seen.add(el);
      }
      for (var el of mats.classic) {
        if (seen.has(el)) continue;
        existing.push({ element: el, attr: 'diffuseColor', value: el.getAttribute('diffuseColor'), hadAttr: el.hasAttribute('diffuseColor') });
        seen.add(el);
      }
      baselineByPart.set(part, existing);
    }

    function setPartColor(part, color) {
      captureBaseline(part);
      var mats = getMaterials(part);
      for (var el of mats.phys) { try { el.setAttribute('diffuseFactor', color); } catch (e) {} }
      for (var el of mats.classic) { try { el.setAttribute('diffuseColor', color); } catch (e) {} }
    }

    function restorePartFromBaseline(part) {
      var records = baselineByPart.get(part) || [];
      for (var r of records) {
        if (r.hadAttr) r.element.setAttribute(r.attr, r.value !== null && r.value !== undefined ? r.value : '');
        else r.element.removeAttribute(r.attr);
      }
    }

    function selectPartByDEF(partDEF) {
      if (!PART_DEFS.includes(partDEF)) return;
      if (currentSelection) {
        try { restorePartFromBaseline(currentSelection); } catch (e) {}
        currentSelection = null;
      }
      var part = document.querySelector("Transform[DEF='" + partDEF + "']");
      if (!part) return;
      restorePartFromBaseline(part);
      setPartColor(part, Colors.select);
      currentSelection = part;
    }

    function attachHoverHandlers(part) {
      part.addEventListener('mouseover', function () {
        if (currentSelection === part) return;
        setPartColor(part, Colors.hover);
      });
      part.addEventListener('mouseout', function () {
        if (currentSelection === part) return;
        restorePartFromBaseline(part);
      });
    }

    function showDetail(partName) {
      var graphContainer = document.getElementById('graph-container');
      if (graphContainer) graphContainer.style.display = 'none';

      var infoTitle = '';
      var infoDescription = '';
      var graphImageFile = '';

      if (PART_DEFS.includes(partName)) {
        var info = INFO[partName];
        infoTitle = info.title;
        infoDescription = info.text;
        selectPartByDEF(partName);

      } else if (partName === 'PressureDistribution') {
        var info = INFO.PressureDistribution;
        infoTitle = info.title;
        infoDescription = info.text;
        graphImageFile = info.image;

      } else {
        infoTitle = 'NACA 2410 Model';
        infoDescription = initialText;
        if (currentSelection) {
          try { restorePartFromBaseline(currentSelection); } catch (e) {}
          currentSelection = null;
        }
      }

      var titleEl = document.getElementById('info-title');
      var descEl = document.getElementById('info-description');
      if (titleEl) titleEl.innerHTML = infoTitle;
      if (descEl) descEl.innerHTML = infoDescription;

      if (graphImageFile && graphContainer) {
        var img = document.getElementById('graph-image');
        if (img) img.src = graphImageFile;
        graphContainer.style.display = 'block';
      }
    }

    function showGraph(graphKey) {
      var graph = GRAPH_INFO[graphKey];
      if (!graph) return;

      var titleEl = document.getElementById('info-title');
      var descEl = document.getElementById('info-description');
      var graphContainer = document.getElementById('graph-container');
      var img = document.getElementById('graph-image');

      if (titleEl) titleEl.innerHTML = graph.title;
      if (descEl) descEl.innerHTML = graph.text;
      if (img) img.src = graph.image;
      if (graphContainer) graphContainer.style.display = 'block';

      if (currentSelection) {
        try { restorePartFromBaseline(currentSelection); } catch (e) {}
        currentSelection = null;
      }
    }

    function bindButtonName(viewpointID) {
      var vp = document.getElementById(viewpointID);
      if (vp) vp.setAttribute('set_bind', 'true');
    }

    document.addEventListener('DOMContentLoaded', function () {
      showDetail('initial');

      x3dom.runtime.ready = function () {
        var x3dEl = document.getElementById('x3dElement');
        if (x3dEl && x3dEl.runtime && x3dEl.runtime.resetView) {
          try { x3dEl.runtime.resetView(); } catch (e) {}
        }
        force2410WhiteDeep();
        setInterval(force2410WhiteDeep, 500);

        for (var i = 0; i < PART_DEFS.length; i++) {
          var part = document.querySelector("Transform[DEF='" + PART_DEFS[i] + "']");
          if (!part) continue;
          try { captureBaseline(part); } catch (e) {}
          attachHoverHandlers(part);
        }
      };
    });
  </script>
</head>

<body>

  <a id="back-btn" href="../">&#8592; Aircraft Design</a>

  <div id="HUDs_Div">
    <div id="X3DOM_AOPT_Links" class="group">
      NACA 2410 and NASA X-57 Visualization
      <hr>
      <form>
        <label><input type="radio" name="buttons" value="Viewpoint1" checked onclick="bindButtonName('Viewpoint1')"> Viewpoint 1</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint2" onclick="bindButtonName('Viewpoint2')"> Viewpoint 2</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint3" onclick="bindButtonName('Viewpoint3')"> Viewpoint 3</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint4" onclick="bindButtonName('Viewpoint4')"> Viewpoint 4</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint5" onclick="bindButtonName('Viewpoint5')"> Viewpoint 5</label><br>
        <label><input type="radio" name="buttons" value="Viewpoint6" onclick="bindButtonName('Viewpoint6')"> Viewpoint 6</label><br>

        <hr>
        <button type="button" onclick="togglePressureView()">Pressure Distribution</button><br>
        <button type="button" onclick="toggleInteriorView()">Interior View</button><br>

        <div id="alphaBlock">
          <label>Alpha: <span id="alphaValueText">0&deg;</span></label><br>
          <input id="alphaSlider" type="range" min="-3" max="6" step="1" value="0"
                 onchange="updatePressureAngle(this.value)"
                 oninput="updatePressureAngle(this.value)">
        </div>

        <hr>
        <button type="button" onclick="showGraph('clalpha')">CL vs Alpha</button><br>
        <button type="button" onclick="showGraph('cmalpha')">CM vs Alpha</button><br>
        <button type="button" onclick="showGraph('cdalpha')">CD vs Alpha</button><br>
        <button type="button" onclick="showGraph('ldalpha')">L/D vs Alpha</button><br>
        <button type="button" onclick="showGraph('dragpolar')">Drag Polar</button>
      </form>
    </div>
  </div>

  <x3d id="x3dElement" showStat="false" showLog="false"
       style="width:100%; height:100%; border:0; margin:0; padding:0;">
    <Scene>

      <Viewpoint id="Viewpoint1"

        zNear="0.04864" zFar="1486.37978"
        centerOfRotation="17.92187 4.55105 -21.97242"
        fieldOfView="0.78540"
        description="Port Side">
      </Viewpoint>

      <Viewpoint id="Viewpoint2"
        position="-9.07127 12.75588 2.47211"
        orientation="-0.00850 0.99941 0.03342 2.30075"
        zNear="0.04864" zFar="1486.37978"
        centerOfRotation="17.92187 4.55105 -21.97242"
        fieldOfView="0.78540"
        description="Port Side">
      </Viewpoint>

      <Viewpoint id="Viewpoint3"
        position="-14.97364 11.37228 24.87644"
        orientation="-0.03279 0.99834 0.04742 1.91841"
        zNear="0.04864" zFar="1486.37978"
        centerOfRotation="17.92187 4.55105 -21.97242"
        fieldOfView="0.78540"
        description="Port Side">
      </Viewpoint>

      <Viewpoint id="Viewpoint4"
        position="-31.84050 10.59398 5.93062"
        orientation="-0.01822 0.99775 0.06450 2.39144"
        zNear="0.04864" zFar="1486.37978"
        centerOfRotation="17.92187 4.55105 -21.97242"
        fieldOfView="0.78540"
        description="Front View">
      </Viewpoint>

      <Viewpoint id="Viewpoint5"
        position="-12.06638 8.21037 24.03618"
        orientation="-0.01822 0.99775 0.06450 2.39144"
        zNear="0.04864" zFar="1486.37978"
        centerOfRotation="17.92187 4.55105 -21.97242"
        fieldOfView="0.78540"
        description="Port Side">
      </Viewpoint>

      <Viewpoint id="Viewpoint6"
        position="-10.40670 7.25311 36.39373"
        orientation="-0.03279 0.99834 0.04742 1.91841"
        zNear="0.04864" zFar="1486.37978"
        centerOfRotation="-49.72810 2.96452 42.45612"
        fieldOfView="0.78540"
        description="Front View">
      </Viewpoint>

      <NavigationInfo type='"EXAMINE" "ANY"' avatarSize="0.25 1.75 0.75" headlight="false"></NavigationInfo>

      <DirectionalLight direction="-.8 -.8 -.8" intensity=".7"></DirectionalLight>
      <DirectionalLight direction="-.8 -.8  .8" intensity=".7"></DirectionalLight>
      <DirectionalLight direction=" .8 -.8  .8" intensity=".7"></DirectionalLight>
      <DirectionalLight direction=" .8 -.8 -.8" intensity=".7"></DirectionalLight>
      <DirectionalLight direction="0 1 0" intensity=".2"></DirectionalLight>

      <background DEF="WO_World"
        backUrl="./nz1.png" bottomUrl="./ny.png" frontUrl="./pz.png"
        leftUrl="./nx.png" rightUrl="./px.png" topUrl="./py.png"
        skyColor="0.05 0.05 0.05"
        groundColor=".1 1 .1">
      </background>

      <Transform translation="0 -0.25 0" onclick="showDetail('initial')">
        <Shape>
          <Appearance>
            <Material diffuseColor=".3 .3 .3"></Material>
            <ImageTexture url="actual_floor2.jpg"></ImageTexture>
            <TextureTransform center="0.5 0.5" scale="30 30" rotation="0.785" translation="-0.148 0.21"></TextureTransform>
          </Appearance>
          <Box size="500 .5 500"></Box>
        </Shape>
      </Transform>

      <Transform DEF="PlanePitch" translation="-30 -5 25" rotation="0 0 1 0" scale="1 1 1">
      <Transform DEF="PlaneRotation" translation="0 0 0" rotation="0 1 0 3.14" scale="1 1 1">
      <Transform DEF="PlaneGroup" translation="0 0 0" rotation="1 0 0 0" scale="1 1 1">

        <Transform DEF="Aircraft" id="Aircraft"
           translation="20 8 -18"
           rotation="1 0 0 -1.57"
           scale="1 1 1">

          <Transform DEF="FuselagePart" onclick="showDetail('FuselagePart')">
            <Inline id="FuselageInline" mapDEFToID="true" url="./NEWfuselage.glb" nameSpaceName="fuselage2410"></Inline>
          </Transform>

          <Transform DEF="WingPart" onclick="showDetail('WingPart')">
            <Inline id="WingInline" mapDEFToID="true" url="./NEWwing.glb" nameSpaceName="wing2410"></Inline>
          </Transform>

          <Transform DEF="ControlSurfacesPart" onclick="showDetail('ControlSurfacesPart')">
            <Inline id="HorizInline" mapDEFToID="true" url="./NEWhoriz.glb" nameSpaceName="horiz2410"></Inline>
            <Inline id="VertInline" mapDEFToID="true" url="./NEWvert.glb" nameSpaceName="vert2410"></Inline>
          </Transform>

        </Transform>

        <Transform DEF="InteriorView" id="InteriorView"
          render="false"
          translation="15 8 -15"
          rotation="1 0 0 -1.57"
          scale=".07 .07 .07"
          onclick="showDetail('FuselagePart')">
          <Inline mapDEFToID="true" url="./newinterior.glb" nameSpaceName="interior_view"></Inline>
        </Transform>

        <Transform DEF="PressureDistribution" id="PressureDistribution"
          render="false"
          translation="15 8 -15"
          rotation="1 0 0 -1.57"
          scale="1 1 1"
          onclick="showDetail('PressureDistribution')">

          <Transform id="Pressure_-3" render="false">
            <Inline mapDEFToID="true" url="./neg3.glb" nameSpaceName="pressure_m3"></Inline>
